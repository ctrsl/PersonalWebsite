# Netlify build/deploy settings.
# This is a plain static site — there is nothing to "build",
# so we just publish the project folder as-is.

[build]
  publish = "."

# Security + caching headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Keep the admin panel out of search engines
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
